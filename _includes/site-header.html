<header class="site-header">
  <div class="header-top-row">
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>

    {% if site.description %}
      <p class="tagline">{{ site.description }}</p>
    {% endif %}
  </div>

  {% if site.contact %}
    <ul class="contact-list" aria-label="Contact links">
      {% if site.contact.email %}
        <li>
          <a class="contact-icon-link" href="mailto:{{ site.contact.email }}" aria-label="Email" title="Email">
            <svg class="contact-icon" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
              <path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm0 2v.2l9 6.75 9-6.75V7l-9 6.75L3 7Z" />
            </svg>
          </a>
        </li>
      {% endif %}
      {% if site.contact.linkedin %}
        <li>
          <a class="contact-icon-link" href="{{ site.contact.linkedin }}" aria-label="LinkedIn" title="LinkedIn">
            <svg class="contact-icon" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
              <path d="M6.94 8.5a1.72 1.72 0 1 1 0-3.44 1.72 1.72 0 0 1 0 3.44ZM5.5 9.75h2.88V19H5.5V9.75Zm4.7 0h2.76v1.26h.04c.38-.72 1.32-1.48 2.72-1.48 2.9 0 3.44 1.9 3.44 4.36V19h-2.88v-4.54c0-1.08-.02-2.48-1.5-2.48-1.5 0-1.74 1.17-1.74 2.4V19H10.2V9.75Z" />
            </svg>
          </a>
        </li>
      {% endif %}
    </ul>
  {% endif %}
</header>
